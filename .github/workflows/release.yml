name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. 1.0.9). Required when running manually from a branch."
        required: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Resolve version and tag
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG="${GITHUB_REF_NAME}"
            VERSION="${TAG#v}"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
            TAG="v${VERSION}"
          else
            echo "workflow_dispatch from a branch requires the version input." >&2
            exit 1
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Building ${TAG}"

  build-macos:
    runs-on: macos-latest
    needs: prepare

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Homebrew dependencies
        run: |
          brew install create-dmg ffmpeg

      - name: Create venv and install packages
        run: |
          python3 -m venv app/venv
          app/venv/bin/pip install --upgrade pip
          app/venv/bin/pip install \
            "click>=8.1.7" \
            "faster-whisper>=1.0.0" \
            "rich>=13.7.0" \
            "tkinterdnd2>=0.3.0" \
            "typer>=0.12.0" \
            "pillow" \
            "pyinstaller"

      - name: Build DMG + CLI binary
        run: BUILD_VERSION="${{ needs.prepare.outputs.version }}" ./build_dmg.sh

      - name: Rename CLI binary for release
        run: |
          ARCH=$(uname -m)
          cp dist/stenograph "dist/stenograph-macos-${ARCH}"

      - name: Upload macOS release assets
        uses: actions/upload-artifact@v4
        with:
          name: macos-release-assets
          path: |
            dist/Stenographer-${{ needs.prepare.outputs.version }}.dmg
            dist/stenograph-macos-*
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    needs: prepare

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create venv and install packages
        shell: pwsh
        run: |
          python -m venv app/venv
          app/venv/Scripts/python.exe -m pip install --upgrade pip
          app/venv/Scripts/python.exe -m pip install `
            "click>=8.1.7" `
            "faster-whisper>=1.0.0" `
            "rich>=13.7.0" `
            "tkinterdnd2>=0.3.0" `
            "typer>=0.12.0" `
            "pillow" `
            "pyinstaller"

      - name: Build Windows GUI zip + CLI exe
        shell: pwsh
        run: |
          $env:BUILD_VERSION = "${{ needs.prepare.outputs.version }}"
          ./build_windows.ps1

      - name: Upload Windows release assets
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-assets
          path: |
            dist/Stenographer-${{ needs.prepare.outputs.version }}-windows-x64.zip
            dist/stenograph-windows-x86_64.exe
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build-macos
      - build-windows
    permissions:
      contents: write

    steps:
      - name: Download macOS assets
        uses: actions/download-artifact@v4
        with:
          name: macos-release-assets
          path: release-assets

      - name: Download Windows assets
        uses: actions/download-artifact@v4
        with:
          name: windows-release-assets
          path: release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Stenographer ${{ needs.prepare.outputs.tag }}"
          tag_name: "${{ needs.prepare.outputs.tag }}"
          generate_release_notes: true
          files: |
            release-assets/Stenographer-${{ needs.prepare.outputs.version }}.dmg
            release-assets/stenograph-macos-*
            release-assets/Stenographer-${{ needs.prepare.outputs.version }}-windows-x64.zip
            release-assets/stenograph-windows-x86_64.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
